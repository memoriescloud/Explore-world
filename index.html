<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPC 管理能力提升 · 答题辅助</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">EPC</span>
      <div class="titles">
        <h1>管理能力提升 · 答题辅助</h1>
        <p id="bankMeta">题库加载中…</p>
      </div>
    </div>
    <div id="savedTip" class="saved-tip">进度已保存</div>
  </header>

  <section id="subbar" class="subbar hidden">
    <button id="backBtn" class="back-btn" title="返回首页">← 首页</button>
    <h2 id="modeTitle"></h2>
    <div id="modeInfo" class="mode-info"></div>
  </section>

  <main id="app" class="app"></main>

  <div id="modalRoot" class="modal-root hidden">
    <div class="modal-mask"></div>
    <div class="modal-box" id="modalBox"></div>
  </div>

  <footer class="foot">
    <span>数据保存在本机浏览器（localStorage），不会上传。</span>
    <span class="dot">·</span>
    <span>更新题库：把新 Excel 交给我重跑 <code>convert.py</code> 即可。</span>
  </footer>

  <script src="data/questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
