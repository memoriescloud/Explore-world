<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EPC 管理能力提升 · 答题辅助</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">EPC</span>
      <div class="titles">
        <h1>管理能力提升 · 答题辅助</h1>
        <p id="bankMeta">题库加载中…</p>
      </div>
    </div>
    <div id="savedTip" class="saved-tip">进度已保存</div>
  </header>

  <section id="subbar" class="subbar hidden">
    <button id="backBtn" class="back-btn" title="返回首页">← 首页</button>
    <h2 id="modeTitle"></h2>
    <div id="modeInfo" class="mode-info"></div>
  </section>

  <main id="app" class="app"></main>

  <div id="modalRoot" class="modal-root hidden">
    <div class="modal-mask"></div>
    <div class="modal-box" id="modalBox"></div>
  </div>

  <!-- 方案② 添加设备配对弹窗 -->
  <div id="pairModal" class="pair-modal">
    <div class="pair-box">
      <span class="pair-close" id="pairClose">×</span>
      <h4>添加设备</h4>
      <p>用另一台设备扫码，或打开下方链接，即可加入同一份同步数据（一次性，无需注册）。</p>
      <div class="qr" id="pairQr"></div>
      <code class="pair-link" id="pairLink"></code>
      <div class="pair-actions">
        <button class="btn primary" id="pairCopy">复制链接</button>
        <button class="btn" id="pairDone">完成</button>
      </div>
    </div>
  </div>

  <footer class="foot">
    <span>数据保存在本机浏览器，并自动跨设备云端同步。</span>
  </footer>

  <script src="data/questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
